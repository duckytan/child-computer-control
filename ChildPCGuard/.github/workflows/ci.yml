name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore dependencies
      run: dotnet restore ChildPCGuard/ChildPCGuard.sln

    - name: Build
      run: dotnet build ChildPCGuard/ChildPCGuard.sln --no-restore

    - name: Test
      run: dotnet test ChildPCGuard/ChildPCGuard.sln --no-build --verbosity normal

    - name: Publish Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        dotnet publish ChildPCGuard/src/ChildPCGuard.GuardService/ChildPCGuard.GuardService.csproj -c Release -o ChildPCGuard/publish/GuardService --no-build
        dotnet publish ChildPCGuard/src/ChildPCGuard.Agent/ChildPCGuard.Agent.csproj -c Release -o ChildPCGuard/publish/Agent --no-build
        dotnet publish ChildPCGuard/src/ChildPCGuard.LockOverlay/ChildPCGuard.LockOverlay.csproj -c Release -o ChildPCGuard/publish/LockOverlay --no-build

    - name: Upload Artifacts
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: ChildPCGuard-Release
        path: ChildPCGuard/publish/
        retention-days: 30
